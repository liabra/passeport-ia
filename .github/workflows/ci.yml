name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permissions minimales.
permissions:
  contents: read

jobs:
  verifier:
    name: Lint · Types · Contenu · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Audit des dépendances
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Valider le contenu
        run: npm run validate:content

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
